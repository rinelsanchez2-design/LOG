  <line x1="60" y1="40" x2="70" y2="30" stroke="#00C2FF" stroke-width="2"></line>
  
  <!-- Company Name -->
  <text x="100" y="45" font-family="Arial, sans-serif" font-size="22" fill="#0A1F44" font-weight="bold">
    Rinel Tech
  </text>
  <text x="100" y="70" font-family="Arial, sans-serif" font-size="16" fill="#555">
